<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="{{url_for('static', filename='style.css')}}">
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
    <h3 class="header-index2">урааа вы прошли!!!!</h3>

    <h1 class="header-index" style="margin-top: 50px;">Результат:</h1>

    <div style="margin-bottom: 100px;">
        {% for i in all_quest %}
            <div class="header-index">{{i[0]}}</div>
            <div style="margin-top: 30px;">
                {% for c in range(4) %}
                    {% if user_ans[c] == i[1]%}
                        <label class="special_btn">
                    {% else %}
                        {{i[c+1]}}
                    </label>
                {% endfor %}
            </div>
        {% endfor %}
        <button><a href="/">На главную</a></button>
    </div>

</body>
</html>

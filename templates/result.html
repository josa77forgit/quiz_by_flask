<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="{{url_for('static', filename='style.css')}}">
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
    <h3 class="header-index2">урааа вы прошли!!!!</h3>

    <h1 class="header-index" style="margin-top: 50px;">Результат:</h1>

    <div style="margin-bottom: 100px;">
        {% for i in all_quest %}
            <div class="header-index">{{i[0]}}</div>
            <div style="margin-top: 30px;">
                {% for j in i[1:] %}
                    {% if j in right_ans and j in user_ans %}
                        <label class="special_btn" style="background: rgb(62, 179, 88)">
                            {{j}}
                        </label>
                    {% elif j not in right_ans and j in user_ans %}
                        <label class="special_btn" style="background: rgb(184, 15, 15)">
                            {{j}}
                        </label>
                    {% else %}
                        <label class="special_btn">
                            {{j}}
                        </label>
                    {% endif %}
                {% endfor %}
            </div>
        {% endfor %}
        <button class="btn_input"><a href="/">На главную</a></button>
    </div>

</body>
</html>
